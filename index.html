<!DOCTYPE html>
<html lang="pl">
<head>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #1a1a1a; color: white; }

        /* Dolny pasek */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: #2d2d2d;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #444;
            z-index: 10;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 14px;
            cursor: pointer;
        }

        /* Przycisk zarządzania w kole */
        .management-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }

        .management-btn {
            width: 80px;
            height: 80px;
            background: #007bff;
            border-radius: 50%;
            border: 4px solid #1a1a1a;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <!-- Główny przycisk w kole -->
    <div class="management-container">
        <button class="management-btn">Zarządzanie</button>
    </div>

    <!-- Pasek dolny -->
    <nav class="bottom-nav">
        <button class="nav-btn">Czat</button>
        <button class="nav-btn">Akcje</button>
        <div style="width: 80px;"></div> <!-- Puste miejsce na przycisk w kole -->
        <button class="nav-btn">Mapa</button>
        <button class="nav-btn">Ustawienia</button>
    </nav>

</body>
</html>
